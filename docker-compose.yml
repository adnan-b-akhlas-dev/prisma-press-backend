services:
  db:
    image: postgres:18-alpine
    container_name: prisma_press
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: prisma_press
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: prisma_press_db
    volumes:
      - prisma_press_data:/var/lib/postgresql/18/docker

volumes:
  prisma_press_data:
